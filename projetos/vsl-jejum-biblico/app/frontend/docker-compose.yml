version: '3.8'

services:
  # Frontend - Jejum Bíblico
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      - NEXT_PUBLIC_APP_NAME=Jejum Bíblico
      - NEXT_PUBLIC_APP_DESCRIPTION=Transformação Espiritual Genuína
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - jejum-biblico

  # Nginx (Proxy reverso - Optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - jejum-biblico

networks:
  jejum-biblico:
    driver: bridge
