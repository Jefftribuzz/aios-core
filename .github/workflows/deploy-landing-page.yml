name: Deploy Landing Page

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - 'primeiro-projeto/landing-page/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build (no-op for static scaffold)
        run: echo "No build step for static site"

  deploy-netlify:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.NETLIFY_AUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx netlify deploy --dir=primeiro-projeto/landing-page --draft --message "PR #${{ github.event.number }} preview"
          else
            npx netlify deploy --dir=primeiro-projeto/landing-page --prod --site=$NETLIFY_SITE_ID
          fi

  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: --prod
          working-directory: 'primeiro-projeto/landing-page'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
